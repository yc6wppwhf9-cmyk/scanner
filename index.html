<style>
  /* ============================================================
     THEME TOKENS  — palette picked for an international trade house:
     cool porcelain "document" paper, ink-blue text, maritime teal
     accent with a restrained brass detail. Both themes defined.
     ============================================================ */
  /* Single, always-white theme (does not follow device dark mode). */
  :root {
    color-scheme: light;
    --paper:      #FFFFFF;
    --surface:    #FFFFFF;
    --surface-2:  #F5F7F9;
    --ink:        #0F1720;
    --ink-2:      #4C5A67;
    --ink-3:      #7C8996;
    --line:       #E3E8ED;
    --line-2:     #EDF1F4;
    --teal:       #0C6B62;
    --teal-deep:  #084F49;
    --teal-soft:  #E4F0EE;
    --brass:      #9A6E2B;
    --focus:      #10897E;
    --shadow:     0 1px 2px rgba(16,23,32,.05), 0 8px 24px -12px rgba(16,23,32,.14);
    --shadow-lg:  0 2px 4px rgba(16,23,32,.06), 0 24px 48px -20px rgba(16,23,32,.22);
  }

  * { box-sizing: border-box; }

  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* Faint document-grid texture on the page ground */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      linear-gradient(to right, color-mix(in srgb, var(--ink) 4%, transparent) 1px, transparent 1px),
      linear-gradient(to bottom, color-mix(in srgb, var(--ink) 4%, transparent) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
    opacity: .5;
    z-index: 0;
  }

  .serif { font-family: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, "Times New Roman", serif; }
  .mono  { font-family: ui-monospace, "Cascadia Code", "SF Mono", Menlo, Consolas, monospace; }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1120px;
    margin: 0 auto;
    padding: 0 clamp(18px, 4vw, 40px);
  }

  a { color: inherit; }

  /* ---------- Eyebrow / labels ---------- */
  .eyebrow {
    font-family: ui-monospace, "Cascadia Code", "SF Mono", Menlo, Consolas, monospace;
    font-size: .72rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--brass);
    margin: 0;
    display: flex; align-items: center; gap: .7em;
  }
  .eyebrow::before {
    content: "";
    width: 26px; height: 1px;
    background: var(--brass);
    display: inline-block;
    opacity: .8;
  }

  /* ---------- Masthead ---------- */
  header.mast {
    border-bottom: 1px solid var(--line);
    background: color-mix(in srgb, var(--surface) 70%, transparent);
    backdrop-filter: blur(8px);
    position: sticky; top: 0; z-index: 20;
  }
  .mast-inner {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
    padding: 14px 0;
  }
  .brandmark { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .brandmark .seal {
    width: 38px; height: 38px; flex: none;
    border: 1px solid var(--teal);
    color: var(--teal);
    border-radius: 50%;
    display: grid; place-items: center;
    font-weight: 700; font-size: .95rem;
    letter-spacing: .02em;
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
  }
  .brandmark .wtxt { line-height: 1.15; }
  .brandmark .wtxt b {
    display: block;
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    font-size: 1.12rem; font-weight: 600; letter-spacing: .01em;
  }
  .brandmark .wtxt span {
    font-size: .66rem; letter-spacing: .22em; text-transform: uppercase; color: var(--ink-3);
    font-family: ui-monospace, Consolas, monospace;
  }
  .mast-actions { display: flex; align-items: center; gap: 8px; }

  /* ---------- Buttons ---------- */
  .btn {
    appearance: none; border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink);
    font: inherit; font-size: .92rem; font-weight: 500;
    padding: .55em 1em;
    border-radius: 10px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: .5em;
    text-decoration: none;
    transition: border-color .15s, background .15s, transform .05s, color .15s;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--teal); color: var(--teal); }
  .btn:active { transform: translateY(1px); }
  .btn svg { width: 17px; height: 17px; }
  .btn.primary {
    background: var(--teal); border-color: var(--teal); color: #fff;
  }
  .btn.primary:hover { background: var(--teal-deep); border-color: var(--teal-deep); color: #fff; }
  .btn:focus-visible, a:focus-visible, .cat:focus-visible {
    outline: 2px solid var(--focus); outline-offset: 2px;
  }

  /* ---------- Hero ---------- */
  .hero { padding: clamp(48px, 8vw, 92px) 0 clamp(30px, 5vw, 52px); }
  .hero h1 {
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    font-weight: 600;
    font-size: clamp(2.1rem, 6vw, 3.5rem);
    line-height: 1.05;
    letter-spacing: -.015em;
    margin: .5em 0 0;
    max-width: 15ch;
    text-wrap: balance;
  }
  .hero p.lede {
    margin: 1.1em 0 0;
    font-size: clamp(1.02rem, 1.6vw, 1.18rem);
    color: var(--ink-2);
    max-width: 56ch;
  }
  .hero .meta {
    margin-top: 26px;
    display: flex; flex-wrap: wrap; gap: 10px 20px;
    align-items: center;
    font-family: ui-monospace, Consolas, monospace;
    font-size: .78rem; letter-spacing: .04em;
    color: var(--ink-3);
  }
  .hero .meta b { color: var(--ink); font-weight: 600; }
  .hero .meta .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--brass); }

  /* ---------- Hero banner image ---------- */
  .hero-banner {
    position: relative;
    margin: 0 0 clamp(20px, 4vw, 36px);
    overflow: hidden;
    background: #46b4ef;
  }
  .hero-banner img {
    display: block; width: 100%; height: auto;
  }
  .hero-banner figcaption {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: clamp(22px, 5vw, 46px) clamp(18px, 4vw, 40px);
    background: linear-gradient(to top, rgba(9,14,19,.66), rgba(9,14,19,.16) 55%, transparent);
  }
  .hero-banner figcaption span {
    display: block; max-width: 1120px; margin: 0 auto;
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    font-weight: 600; color: #fff;
    font-size: clamp(1.5rem, 4.4vw, 3rem); line-height: 1.08; letter-spacing: -.01em;
    text-wrap: balance; text-shadow: 0 2px 16px rgba(0,0,0,.4);
  }

  /* ---------- Section frame ---------- */
  section.band { padding: clamp(30px, 5vw, 56px) 0; }
  .sec-head { margin-bottom: 26px; }
  .sec-head h2 {
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    font-weight: 600; font-size: clamp(1.4rem, 3vw, 1.9rem);
    margin: .35em 0 0; letter-spacing: -.01em;
  }

  /* ---------- Catalogue grid ---------- */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(268px, 1fr));
    gap: 14px;
  }
  .cat {
    position: relative;
    display: flex; flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px 20px 18px;
    color: inherit;
    box-shadow: var(--shadow);
    transition: box-shadow .16s ease, border-color .16s ease;
    overflow: hidden;
    min-height: 172px;
  }
  /* document spine detail */
  .cat::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: linear-gradient(var(--teal), var(--teal-deep));
    opacity: .0; transition: opacity .16s;
  }
  .cat:hover { box-shadow: var(--shadow-lg); border-color: color-mix(in srgb, var(--teal) 35%, var(--line)); }
  .cat:hover::before { opacity: 1; }

  .cat .actions { display: flex; gap: 8px; }
  .act {
    display: inline-flex; align-items: center; gap: .4em;
    font: inherit; font-size: .82rem; font-weight: 600;
    text-decoration: none; cursor: pointer;
    padding: .5em .8em; border-radius: 9px;
    border: 1px solid var(--line); background: var(--surface); color: var(--ink);
    transition: border-color .15s, background .15s, color .15s;
  }
  .act svg { width: 15px; height: 15px; }
  .act.preview:hover { border-color: var(--teal); color: var(--teal); }
  .act.download { background: var(--teal); border-color: var(--teal); color: #fff; }
  .act.download:hover { background: var(--teal-deep); border-color: var(--teal-deep); color: #fff; }
  .act.muted { color: var(--ink-3); border-style: dashed; cursor: default; }
  .act:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }
  .cat .tag {
    align-self: flex-start;
    font-family: ui-monospace, Consolas, monospace;
    font-size: .66rem; letter-spacing: .14em; text-transform: uppercase;
    color: var(--teal);
    background: var(--teal-soft);
    padding: .35em .7em; border-radius: 6px;
    margin-bottom: 14px;
  }
  .cat h3 {
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    font-weight: 600; font-size: 1.16rem; line-height: 1.22;
    margin: 0 0 6px;
  }
  .cat p { margin: 0; color: var(--ink-2); font-size: .92rem; line-height: 1.5; }
  .cat .foot {
    margin-top: auto; padding-top: 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px 12px;
    flex-wrap: wrap;
  }
  .cat .fmeta { font-family: ui-monospace, Consolas, monospace; font-size: .72rem; color: var(--ink-3); letter-spacing: .03em; }
  .cat .go {
    display: inline-flex; align-items: center; gap: .4em;
    font-size: .85rem; font-weight: 600; color: var(--teal);
  }
  .cat .go svg { width: 15px; height: 15px; transition: transform .16s; }
  .cat[href]:hover .go svg { transform: translateX(3px); }
  .cat.pending { }
  .cat.pending .go { color: var(--ink-3); font-weight: 500; }

  /* ---------- Connect / social ---------- */
  .social-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 12px;
  }
  .social {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    text-decoration: none; color: inherit;
    transition: border-color .15s, transform .1s, box-shadow .15s;
  }
  .social:hover { border-color: color-mix(in srgb, var(--teal) 50%, var(--line)); transform: translateY(-2px); box-shadow: var(--shadow); }
  .social.soon { opacity: .6; cursor: default; }
  .social.soon:hover { border-color: var(--line); transform: none; box-shadow: none; }
  .social.soon .lbl span { font-style: italic; }
  .social .ic {
    width: 40px; height: 40px; flex: none;
    border-radius: 10px;
    display: grid; place-items: center;
    background: var(--surface-2);
    color: var(--ink);
    border: 1px solid var(--line-2);
  }
  .social:hover .ic { color: var(--teal); border-color: color-mix(in srgb, var(--teal) 40%, var(--line)); }
  .social .ic svg { width: 20px; height: 20px; }
  .social .lbl { line-height: 1.25; min-width: 0; }
  .social .lbl b { display: block; font-weight: 600; font-size: .94rem; }
  .social .lbl span { font-size: .78rem; color: var(--ink-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

  /* ---------- Share / QR band ---------- */
  .share {
    background:
      radial-gradient(120% 120% at 100% 0%, color-mix(in srgb, var(--teal) 12%, var(--surface)) 0%, var(--surface) 55%);
    border: 1px solid color-mix(in srgb, var(--teal) 22%, var(--line));
    border-radius: 20px;
    box-shadow: var(--shadow-lg);
    padding: clamp(24px, 4vw, 40px);
    display: grid;
    grid-template-columns: auto 1fr;
    gap: clamp(22px, 4vw, 44px);
    align-items: center;
  }
  .qr-card {
    background: #fff;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 10px 30px -14px rgba(16,23,32,.4);
    width: 208px; height: 208px;
    display: grid; place-items: center;
    flex: none;
  }
  .qr-card svg, .qr-card img { width: 100%; height: 100%; display: block; }
  .share .txt { min-width: 0; }
  .share h2 {
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    font-weight: 600; font-size: clamp(1.5rem, 3vw, 2.05rem); margin: .3em 0 .3em; letter-spacing: -.01em;
  }
  .share p { margin: 0 0 20px; color: var(--ink-2); max-width: 46ch; }
  .linkrow {
    display: flex; align-items: stretch; gap: 8px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 10px; padding: 6px 6px 6px 14px;
    max-width: 480px; margin-bottom: 14px;
  }
  .linkrow input {
    flex: 1; min-width: 0; border: none; background: transparent; color: var(--ink);
    font-family: ui-monospace, Consolas, monospace; font-size: .82rem;
  }
  .linkrow input:focus { outline: none; }
  .share-actions { display: flex; flex-wrap: wrap; gap: 8px; }

  /* ---------- Footer ---------- */
  footer.foot {
    border-top: 1px solid var(--line);
    padding: 40px 0 56px;
    margin-top: 20px;
  }
  .foot-inner { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 24px; align-items: flex-start; }
  .foot .contact { display: grid; gap: 6px; }
  .foot .contact a { text-decoration: none; color: var(--ink-2); font-size: .92rem; display: inline-flex; align-items: center; gap: .55em; }
  .foot .contact a:hover { color: var(--teal); }
  .foot .contact a svg { width: 15px; height: 15px; color: var(--ink-3); }
  .foot .fine { color: var(--ink-3); font-size: .78rem; font-family: ui-monospace, Consolas, monospace; letter-spacing: .03em; max-width: 30ch; }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed; left: 50%; bottom: 28px; transform: translate(-50%, 20px);
    background: var(--ink); color: var(--paper);
    padding: .7em 1.2em; border-radius: 10px; font-size: .9rem; font-weight: 500;
    box-shadow: var(--shadow-lg);
    opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 60;
    display: flex; align-items: center; gap: .5em;
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }
  .toast svg { width: 16px; height: 16px; color: var(--teal); }

  @media (max-width: 620px) {
    .share { grid-template-columns: 1fr; justify-items: center; text-align: center; }
    .share .txt { text-align: left; }
    .eyebrow { justify-content: flex-start; }
    .brandmark .wtxt span { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; scroll-behavior: auto !important; }
  }
</style>

  globe:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.5 2.5 15 0 18M12 3c-2.5 2.5-2.5 15 0 18"/></svg>',

const eyeSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>';
const dlSvg  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>';

/* ---------------- Render ---------------- */
function el(html){ const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstElementChild; }

document.getElementById('foot-brand').textContent = SITE.legal || SITE.brand;
document.title = SITE.brand + " — Catalogues & Contact";

const catGrid = document.getElementById('catGrid');
SITE.catalogues.forEach(c => {
  const has = c.url && c.url.trim();
  const card = el(`<div class="cat">
      <span class="tag"></span>
      <h3></h3>
      <p></p>
      <div class="foot">
        <span class="fmeta"></span>
        <div class="actions"></div>
      </div>
    </div>`);
  card.querySelector('.tag').textContent = c.tag;
  card.querySelector('h3').textContent   = c.title;
  card.querySelector('p').textContent    = c.desc;
  card.querySelector('.fmeta').textContent = c.meta || '';
  const actions = card.querySelector('.actions');
  if (has) {
    const preview = el(`<a class="act preview" target="_blank" rel="noopener">${eyeSvg}<span>Preview</span></a>`);
    preview.href = c.url;
    const download = el(`<a class="act download" download>${dlSvg}<span>Download</span></a>`);
    download.href = c.url;
    actions.appendChild(preview);
    actions.appendChild(download);
  } else {
    actions.appendChild(el(`<span class="act muted">Coming soon</span>`));
  }
  catGrid.appendChild(card);
});

const socialGrid = document.getElementById('socialGrid');
SITE.social.forEach(s => {
  const has = s.url && s.url.trim();
  const item = el(`<${has ? 'a' : 'div'} class="social ${has ? '' : 'soon'}">
      <span class="ic">${ICONS[s.icon] || ICONS.globe}</span>
      <span class="lbl"><b></b><span></span></span>
    </${has ? 'a' : 'div'}>`);
  if (has) {
    item.href = s.url;
    if (s.url.startsWith('http')) { item.target = '_blank'; item.rel = 'noopener'; }
  }
  item.querySelector('b').textContent = s.name;
  item.querySelector('.lbl span').textContent = has ? s.handle : 'Link coming soon';
  socialGrid.appendChild(item);
});

const contactBox = document.getElementById('contact');
SITE.contact.forEach(c => {
  if (!c.text) return;
  const a = el(`<a href="${c.url || '#'}">${ICONS[c.icon] || ''}<span></span></a>`);
  a.querySelector('span').textContent = c.text;
  contactBox.appendChild(a);
});

/* ---------------- Copy-link behaviour ---------------- */
const url = window.location.href.split('#')[0];

const toast = document.getElementById('toast');
const toastMsg = document.getElementById('toastMsg');
let toastTimer;
function showToast(msg){
  toastMsg.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> toast.classList.remove('show'), 2200);
}
async function copyLink(){
  try { await navigator.clipboard.writeText(url); }
  catch(e){
    const i = document.getElementById('pageUrl'); i.focus(); i.select();
    try { document.execCommand('copy'); } catch(_) {}
  }
  showToast('Link copied to clipboard');
}
</script>
